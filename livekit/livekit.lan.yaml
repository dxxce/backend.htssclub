# LiveKit — cấu hình LAN nội bộ (vd máy 192.168.1.86). Không cần TURN.
# Chạy: livekit-server --config ./livekit/livekit.lan.yaml
port: 7880

rtc:
  udp_port: 7882
  tcp_port: 7881
  # IP LAN của máy chạy LiveKit. Client trong cùng mạng kết nối media qua IP này.
  external_ip: "192.168.1.86"

# Đổi sang key thật bằng: livekit-server generate-keys
keys:
  devkey: "secret"

logging:
  level: info
